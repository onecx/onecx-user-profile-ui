<div
  *ngIf="{
    userName: username$ | async
  } as data"
  [attr.aria-label]="'USER_NAME.TOOLTIP' | translate"
  role="note"
  [attr.pTooltip]="'USER_NAME.TOOLTIP' | translate"
  tooltipPosition="top"
  tooltipEvent="hover"
>
  {{ data.userName }}
</div>
